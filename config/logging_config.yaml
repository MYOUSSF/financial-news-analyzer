# =============================================================================
# Financial News Analyzer — Logging Configuration
# =============================================================================
# Used by loguru. The application reads this file at startup via src/utils/logger.py

version: 1

# -----------------------------------------------------------------------------
# Global settings
# -----------------------------------------------------------------------------
level: INFO          # Minimum log level: DEBUG | INFO | WARNING | ERROR | CRITICAL
enqueue: true        # Use a background thread for async-safe logging
backtrace: true      # Show full traceback on exceptions
diagnose: false      # Show variable values in tracebacks (disable in production)


# -----------------------------------------------------------------------------
# Sinks (output destinations)
# -----------------------------------------------------------------------------
sinks:

  # Console — human-readable coloured output
  console:
    enabled: true
    level: INFO
    format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
    colorize: true

  # Application log file — INFO and above, rotated daily
  app_file:
    enabled: true
    level: INFO
    path: logs/app.log
    format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"
    rotation: "00:00"         # Rotate at midnight
    retention: "30 days"      # Keep 30 days of logs
    compression: zip
    encoding: utf-8

  # Error log — WARNING and above, longer retention
  error_file:
    enabled: true
    level: WARNING
    path: logs/error.log
    format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}\n{exception}"
    rotation: "100 MB"
    retention: "90 days"
    compression: zip
    encoding: utf-8

  # JSON log — machine-readable, for log aggregation (ELK, Datadog, etc.)
  json_file:
    enabled: false            # Set true in production / when using a log shipper
    level: INFO
    path: logs/app.json
    format: "{message}"      # Content is serialized to JSON by the json_logger filter
    rotation: "50 MB"
    retention: "14 days"
    compression: zip
    serialize: true           # loguru native JSON serialization


# -----------------------------------------------------------------------------
# Per-module overrides
# -----------------------------------------------------------------------------
# Increase verbosity for specific modules during development.
# Set to DEBUG to see full agent input/output traces.
modules:
  src.agents.research_agent: INFO
  src.agents.sentiment_agent: INFO
  src.agents.risk_agent: INFO
  src.agents.summary_agent: INFO
  src.chains.analysis_chain: INFO
  src.utils.vector_store: INFO
  src.tools.news_tool: INFO
  src.tools.stock_tool: INFO
  src.tools.economic_tool: INFO
  src.api.main: INFO
  httpx: WARNING              # Suppress verbose HTTP client logs
  transformers: WARNING       # Suppress HuggingFace model download messages
  chromadb: WARNING
