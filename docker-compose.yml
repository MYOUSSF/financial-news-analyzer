version: '3.8'

services:
  # Main application
  app:
    build: .
    container_name: financial-analyzer
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis (optional, for caching)
  redis:
    image: redis:7-alpine
    container_name: financial-analyzer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # PostgreSQL (optional, for production database)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: financial-analyzer-db
  #   environment:
  #     POSTGRES_DB: financial_analyzer
  #     POSTGRES_USER: ${DB_USER:-finanalyzer}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  redis_data:
  # postgres_data:

networks:
  default:
    name: financial-analyzer-network
